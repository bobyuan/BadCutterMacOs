name: BadmintonVideoCutter
options:
  deploymentTarget:
    macOS: '14.0'
settings:
  SWIFT_VERSION: '5.9'
targets:
  BadmintonVideoCutter:
    type: application
    platform: macOS
    sources:
      - path: BadmintonVideoCutter
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.buddy.badmintonvideocutter
      GENERATE_INFOPLIST_FILE: YES
    info:
      path: BadmintonVideoCutter/Resources/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.sports
  BadmintonVideoCutterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BadmintonVideoCutterTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.buddy.badmintonvideocutter.tests
    dependencies:
      - target: BadmintonVideoCutter
